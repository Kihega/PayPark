# ── ParkiPay CI Pipeline ────────────────────────────────────────────────────
# Trigger: every push / PR to the `develop` branch
# Jobs:    backend-quality → backend-tests → frontend-quality → merge-to-main
#
# Required GitHub Secrets:
#   GH_PAT — Personal Access Token (repo + workflow scopes)
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND QUALITY (Lint + Formatting)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend-quality:
    name: "Backend — Lint, Import Order & Format"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 isort black

      - name: flake8 (code style & errors)
        run: |
          flake8 . \
            --max-line-length=120 \
            --exclude=venv,.venv,migrations,__pycache__,.git,build,dist

      - name: isort (import sorting check)
        run: |
          isort . \
            --check-only \
            --diff \
            --profile black \
            --skip migrations \
            --skip venv \
            --skip .venv

      - name: black (format check)
        run: |
          black . \
            --check \
            --line-length=120 \
            --exclude="(venv|.venv|migrations|__pycache__)"

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND TESTS (Pytest + DB)
# ─────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend — Pytest"
    runs-on: ubuntu-latest
    needs: backend-quality

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: parkipay_test
          POSTGRES_USER: parkipay
          POSTGRES_PASSWORD: parkipay
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: local
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgres://parkipay:parkipay@localhost:5432/parkipay_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          pytest -v \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND QUALITY (Expo / React Native)
# ─────────────────────────────────────────────────────────────────────────────
  frontend-quality:
    name: "Frontend — Lint & Type Check"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run type-check

# ─────────────────────────────────────────────────────────────────────────────
# AUTO MERGE (develop → main)
# ─────────────────────────────────────────────────────────────────────────────
  merge-to-main:
    name: "Auto Merge develop → main"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [backend-quality, backend-tests, frontend-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into main
        run: |
          git checkout main
          git merge --no-ff develop -m "ci: auto-merge develop → main"
          git push origin main
