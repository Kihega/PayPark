name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

defaults:
  run:
    shell: bash

# ─────────────────────────────────────────────────────────────
# Backend Quality
# ─────────────────────────────────────────────────────────────
jobs:
  backend-quality:
    name: "Backend — Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: flake8
        run: flake8 . --max-line-length=120 --exclude=migrations,__pycache__,.venv

      - name: isort
        run: isort . --check-only --diff --profile black

      - name: black
        run: black . --check --line-length=120


# ─────────────────────────────────────────────────────────────
# Backend Tests
# ─────────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend — Pytest"
    runs-on: ubuntu-latest
    needs: backend-quality
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: parkipay_test
          POSTGRES_USER: parkipay
          POSTGRES_PASSWORD: parkipay
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENV: local
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgres://parkipay:parkipay@localhost:5432/parkipay_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Django check
        run: python manage.py check

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: |
          pytest --cov=apps --cov-report=term-missing -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7


# ─────────────────────────────────────────────────────────────
# Frontend Quality
# ─────────────────────────────────────────────────────────────
  frontend-quality:
    name: "Frontend — ESLint & TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('mobile/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run type-check


# ─────────────────────────────────────────────────────────────
# Safe Merge Strategy (develop → main)
# ─────────────────────────────────────────────────────────────
  merge-to-main:
    name: "Merge develop → main"
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-tests, frontend-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Safe merge (fast-forward only)
        run: |
          git checkout main
          git merge --ff-only origin/develop
          git push origin main
