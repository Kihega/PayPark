# ── ParkiPay CD Pipeline ────────────────────────────────────────────────────
# Trigger: every push to `main` (via CI auto-merge or direct hotfix)
# Jobs:    deploy-backend (Render) and deploy-mobile (EAS) run in parallel
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   RENDER_DEPLOY_HOOK_URL  — Render dashboard → service → Settings → Deploy Hook
#   EXPO_TOKEN              — expo.dev → Account Settings → Access Tokens
# ---------------------------------------------------------------------------

name: CD

on:
  push:
    branches: [main]

# ── Deploy backend to Render ──────────────────────────────────────────────────
jobs:
  deploy-backend:
    name: "Deploy Backend → Render"
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          echo "Render responded with HTTP $HTTP_STATUS"

          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "::error::Render deploy hook failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ Render deploy triggered successfully"

  # ── Build Expo app via EAS ────────────────────────────────────────────────
  deploy-mobile:
    name: "Build Mobile → EAS"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install Expo dependencies
        working-directory: mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: EAS Build (production — Android + iOS)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive \
            --no-wait
