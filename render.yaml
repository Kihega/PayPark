# ── ParkiPay — Render.com Deployment Configuration ────────────────────────────
# Deploy with: render deploy --yaml render.yaml
# Or connect the GitHub repo in the Render dashboard and point to this file.

services:
  # ── Django API (Web Service) ───────────────────────────────────────────────
  - type: web
    name: parkipay-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # upgrade to standard for production
    region: frankfurt      # closest to East Africa on Render
    branch: main

    healthCheckPath: /api/health/

    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true      # Render auto-generates a secure random value
      - key: ALLOWED_HOSTS
        value: parkipay-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: ""               # Add your Expo / web domain after first deploy
      - key: DATABASE_URL
        fromDatabase:
          name: parkipay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: parkipay-redis
          property: connectionString
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      - key: MAX_FAILED_LOGIN_ATTEMPTS
        value: "5"
      - key: LOCKOUT_DURATION_MINUTES
        value: "15"
      - key: CONTROL_NUMBER_VALIDITY_HOURS
        value: "5"
      # Set these manually in the Render dashboard (sensitive):
      # AT_USERNAME, AT_API_KEY, AT_SENDER_ID, RESEND_API_KEY, SENTRY_DSN

  # ── Celery Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: parkipay-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A core worker --loglevel=info --concurrency=2
    plan: starter
    region: frankfurt
    branch: main

    envVars:
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          type: web
          name: parkipay-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: parkipay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: parkipay-redis
          property: connectionString

databases:
  - name: parkipay-db
    plan: starter
    region: frankfurt
    databaseName: parkipay
    user: parkipay

  - name: parkipay-redis
    type: redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: noeviction
