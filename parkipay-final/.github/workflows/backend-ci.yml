# =============================================================================
# ParkiPay — Backend CI
#
# Runs on every push / PR that touches backend/** on the develop branch.
# Pipeline:  lint  →  security-audit  →  test  →  merge-to-main
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   GH_PAT   Personal Access Token — scopes: repo, workflow
# =============================================================================

name: Backend CI

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [develop]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend
    shell: bash

# Cancel any in-progress run for the same branch / PR
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Security Audit ──────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit (npm audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit for high/critical vulnerabilities
        # Fails the build only on high or critical severity CVEs
        run: npm audit --audit-level=high

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (Jest + Supertest)
    runs-on: ubuntu-latest
    needs: [lint, security-audit]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       parkipay_test
          POSTGRES_USER:     parkipay
          POSTGRES_PASSWORD: parkipay
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:     test
      DATABASE_URL: postgresql://parkipay:parkipay@localhost:5432/parkipay_test
      JWT_SECRET:   ci-test-secret-32-chars-minimum!!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ── Merge develop → main (push only, all checks green) ──────────────────────
  merge-to-main:
    name: Merge develop → main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [lint, security-audit, test]

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into main
        run: |
          git checkout main
          git merge --no-ff develop -m "ci(backend): auto-merge develop → main [skip ci]"
          git push origin main
