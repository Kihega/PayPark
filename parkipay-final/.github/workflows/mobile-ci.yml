# =============================================================================
# ParkiPay — Mobile CI
#
# Runs on every push / PR that touches mobile/** on the develop branch.
# Pipeline:  lint  →  type-check  →  test  →  merge-to-main
#
# Required GitHub secrets:
#   GH_PAT   Personal Access Token — scopes: repo, workflow
# =============================================================================

name: Mobile CI

on:
  push:
    branches: [develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [develop]
    paths:
      - "mobile/**"

defaults:
  run:
    working-directory: mobile
    shell: bash

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── TypeScript type check ───────────────────────────────────────────────────
  type-check:
    name: Type Check (tsc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict type check
        run: npm run type-check

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (Jest)
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --passWithNoTests --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 14

  # ── Merge develop → main ────────────────────────────────────────────────────
  merge-to-main:
    name: Merge develop → main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: [lint, type-check, test]

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into main
        run: |
          git checkout main
          git merge --no-ff develop -m "ci(mobile): auto-merge develop → main [skip ci]"
          git push origin main
