# =============================================================================
# ParkiPay — Mobile CD
#
# Triggers an EAS Build for production when mobile/** is merged into main.
#
# Required GitHub secrets:
#   EXPO_TOKEN   Expo personal access token
#               → expo.dev → account settings → Access Tokens
# =============================================================================

name: Mobile CD

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-cd.yml"

concurrency:
  group: mobile-cd
  cancel-in-progress: false

jobs:

  build:
    name: EAS Build (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Build for Android (production)
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --non-interactive

      - name: Write build summary
        run: |
          echo "### 📱 Mobile EAS Build triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platform:** Android"           >> "$GITHUB_STEP_SUMMARY"
          echo "- **Profile:**  production"        >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:**   \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Actor:**    ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
