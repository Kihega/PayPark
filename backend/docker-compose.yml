version: "3.9"

# ParkiPay — Local Development Docker Compose
#
# Starts two services:
#   api      — Express server with hot reload (nodemon)
#   postgres — Local PostgreSQL 16 instance
#
# Usage:
#   docker-compose up --build         # first run
#   docker-compose up                 # subsequent runs
#   docker-compose exec api npm run db:seed   # seed test users
#
# The DATABASE_URL in .env is overridden below to point at the local
# postgres service. All other env vars come from .env.

services:

  # ── Express API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: deps          # use the deps stage for dev (has devDependencies)
    command: >
      sh -c "npx prisma migrate deploy &&
             npx nodemon src/server.js"
    volumes:
      - .:/app
      - /app/node_modules   # prevent host node_modules from overwriting container's
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://parkipay:parkipay@postgres:5432/parkipay
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       parkipay
      POSTGRES_USER:     parkipay
      POSTGRES_PASSWORD: parkipay
    ports:
      - "5432:5432"          # expose locally so you can use Prisma Studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkipay -d parkipay"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
