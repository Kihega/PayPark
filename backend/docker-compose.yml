version: "3.9"

# ParkiPay — Local Development Docker Compose
# Run with: docker-compose up --build
# Connects to Supabase PostgreSQL remotely (set DATABASE_URL in .env)

services:
  # ── Django API ─────────────────────────────────────────────────────────────
  api:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_ENV=local
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (Celery broker + JWT blacklist) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_ENV=local
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
